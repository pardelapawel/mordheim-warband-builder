name: Deploy PR preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      PREVIEW_PATH: pr-${{ github.event.pull_request.number }}
      PREVIEW_URL: https://pardelapawel.github.io/mordheim-warband-builder/pr-${{ github.event.pull_request.number }}/
    steps:
      - name: Checkout PR commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: npm test

      - name: Prepare Pages output
        run: npm run prepare:pages

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Publish preview files
        run: |
          rm -rf "gh-pages/${PREVIEW_PATH}"
          mkdir -p "gh-pages/${PREVIEW_PATH}"
          cp -R dist-pages/. "gh-pages/${PREVIEW_PATH}/"

      - name: Detect gh-pages changes
        id: changes
        run: |
          if [[ -n "$(git -C gh-pages status --short)" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push preview
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git -C gh-pages config user.name "github-actions[bot]"
          git -C gh-pages config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C gh-pages add -A "${PREVIEW_PATH}"
          git -C gh-pages commit -m "Deploy PR preview for #${{ github.event.pull_request.number }}"
          git -C gh-pages push origin gh-pages

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview-link -->';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const existing = comments.find((comment) => comment.body.includes(marker));
            if (existing) {
              return;
            }

            const body = `${marker}\n\nPreview available at: ${process.env.PREVIEW_URL}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
