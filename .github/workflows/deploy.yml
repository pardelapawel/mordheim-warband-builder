name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Pages output
        run: npm run prepare:pages

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Replace root site and preserve previews
        shell: pwsh
        run: |
          Get-ChildItem gh-pages -Force |
            Where-Object {
              $_.Name -ne '.git' -and
              $_.Name -notlike 'pr-*'
            } |
            Remove-Item -Recurse -Force

          Copy-Item dist-pages\* gh-pages\ -Recurse -Force

      - name: Detect gh-pages changes
        id: changes
        shell: bash
        run: |
          if [[ -n "$(git -C gh-pages status --short)" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push root site
        if: steps.changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          git -C gh-pages config user.name "github-actions[bot]"
          git -C gh-pages config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C gh-pages add -A
          git -C gh-pages commit -m "Deploy main site"
          git -C gh-pages push origin gh-pages
