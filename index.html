<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mordheim Warband Builder</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:ital,wght@0,400;0,700;1,400;1,700&family=Metamorphous&family=MedievalSharp&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <header class="app-header no-print">
        <div class="header-inner">
            <div class="header-compact-bar" aria-hidden="true">
                <span id="compact-warband-name" class="compact-warband-name"></span>
                <span class="compact-stat"><strong id="compact-fighters-count">0</strong> cards</span>
                <span class="compact-stat"><strong id="compact-cost-value">0</strong> gc</span>
            </div>
            <div class="header-content">
                <h1 class="logo">Mordheim Builder</h1>
                <div class="warband-meta">
                    <input type="text" id="warband-name" placeholder="Warband Name..." value="My New Warband">
                    <div class="rules-selectors no-print">
                        <div class="selector-group">
                            <label for="rule-set-select">Rule Set:</label>
                            <select id="rule-set-select">
                                <option value="">Loading...</option>
                            </select>
                        </div>
                        <div class="selector-group">
                            <label for="warband-type-select">Type:</label>
                            <select id="warband-type-select" disabled>
                                <option value="">Select Rule Set First</option>
                            </select>
                        </div>
                    </div>
                    <span class="total-cost">Total Cost: <span id="total-cost-value">0</span> gc</span>
                </div>
                <div class="actions-carousel-wrapper">
                    <div class="actions">
                        <button id="theme-toggle-btn" class="btn" title="Toggle Light/Dark Mode">🌓</button>
                        <button id="save-cache-btn" class="btn">Save to Cache</button>
                        <button id="export-json-btn" class="btn">Export JSON</button>
                        <label for="import-json-input" class="btn">Import JSON</label>
                        <input type="file" id="import-json-input" hidden accept=".json">
                        <button id="print-pdf-btn" class="btn highlight">Print PDF</button>
                        <button id="clear-all-btn" class="btn danger">Clear All</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="main-layout">
        <main class="card-grid" id="card-grid">
            <!-- Fighter cards will be injected here -->
             <div id="add-card-placeholder" class="add-card-placeholder no-print">
                <div class="plus-icon">+</div>
             </div>
        </main>

        <aside id="legend-sidebar" class="legend-sidebar"></aside>
    </div>

    <div id="save-manager" class="no-print">
        <button id="save-manager-toggle" class="save-manager-toggle">Saves ▴</button>
        <div class="save-manager-header">
            <h3>Saved Warbands</h3>
            <button id="delete-all-saves-btn" class="btn-text danger">Delete All</button>
        </div>
        <ul id="saved-warbands-list"></ul>
    </div>

    <!-- Global Datalists Removed for Mobile Safari Compatibility -->

    <!-- Templates -->
    <template id="fighter-card-template">
        <div class="card-wrapper">
            <button class="remove-btn no-print" title="Remove Fighter">&times;</button>
            <article class="fighter-card">
                <div class="card-header">
                    <div class="name-container">
                        <textarea class="fighter-name" placeholder="Name of the Warrior" rows="1"></textarea>
                        <button class="reroll-name-btn no-print" title="Generate New Name">🎲</button>
                    </div>
                    <div class="type-selection no-print">
                        <select class="fighter-type-select">
                            <option value="">Quick Select Template...</option>
                        </select>
                    </div>
                    <div class="card-header-meta">
                        <div style="display: flex; flex-wrap: wrap; gap: 4px; flex-grow: 1; margin-right: 10px; align-items: center;">
                            <span class="fighter-type-input fighter-type-badge" contenteditable="true" spellcheck="false" data-placeholder="Type"></span>
                            <span class="fighter-race-input fighter-type-badge" contenteditable="true" spellcheck="false" data-placeholder="Race"></span>
                        </div>
                        <div class="cost-info no-print">
                            <div class="cost-input-container">
                                <input type="number" class="fighter-base-cost" value="0">
                                <span>base</span>
                            </div>
                            <div class="total-card-cost">
                                Total: <span class="fighter-total-cost">0</span> gc
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="stats-table">
                    <div class="stat-col"><label>M</label><input type="number" class="stat-m" value="0"></div>
                    <div class="stat-col"><label>WS</label><input type="number" class="stat-ws" value="0"></div>
                    <div class="stat-col"><label>BS</label><input type="number" class="stat-bs" value="0"></div>
                    <div class="stat-col"><label>S</label><input type="number" class="stat-s" value="0"></div>
                    <div class="stat-col"><label>T</label><input type="number" class="stat-t" value="0"></div>
                    <div class="stat-col"><label>W</label><input type="number" class="stat-w" value="0"></div>
                    <div class="stat-col"><label>I</label><input type="number" class="stat-i" value="0"></div>
                    <div class="stat-col"><label>A</label><input type="number" class="stat-a" value="0"></div>
                    <div class="stat-col"><label>Ld</label><input type="number" class="stat-ld" value="0"></div>
                </div>

                <!-- Melee Weapons -->
                <div class="card-section melee-section" data-category="melee">
                    <div class="section-layout">
                        <span class="material-symbols-outlined section-icon">swords</span>
                        <div class="melee-list item-list"></div>
                    </div>
                </div>

                <!-- Ranged Weapons -->
                <div class="card-section ranged-section" data-category="ranged">
                    <div class="section-layout">
                        <span class="material-symbols-outlined section-icon">target</span>
                        <div class="ranged-list item-list"></div>
                    </div>
                </div>

                <!-- Armor -->
                <div class="card-section armor-section" data-category="armor">
                    <div class="section-layout">
                        <span class="material-symbols-outlined section-icon">shield</span>
                        <div class="armor-list item-list"></div>
                    </div>
                </div>

                <!-- Items -->
                <div class="card-section items-section" data-category="items">
                    <div class="section-layout">
                        <span class="material-symbols-outlined section-icon">inventory_2</span>
                        <div class="items-list item-list"></div>
                    </div>
                </div>

                <!-- Add Equipment -->
                <div class="combobox-container no-print">
                    <input type="text" class="equipment-input" enterkeyhint="done" autocomplete="off" placeholder="Add equipment...">
                </div>

                <!-- Skills -->
                <div class="card-section skills-section" data-category="skills">
                    <div class="section-layout">
                        <span class="material-symbols-outlined section-icon">star_shine</span>
                        <div class="skills-list item-list"></div>
                    </div>
                </div>

                <!-- Add Skills -->
                <div class="combobox-container no-print">
                    <input type="text" class="skills-input" enterkeyhint="done" autocomplete="off" placeholder="Add skill...">
                </div>

                <div class="validation-warnings"></div>
            </article>
        </div>
    </template>

    <script src="nameGenerator.js"></script>
    <script src="app.js"></script>
</body>
</html>
